<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebChat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .hidden { display: none !important; }
        body { background: white; height: 100vh; overflow: hidden; }

        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f2f5; perspective: 1200px; }
        .auth-box {
            background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.2, 0.9, 0.2, 1), box-shadow 0.7s ease;
        }
        .auth-box.open { transform: rotateX(0deg) translateZ(18px); box-shadow: 0 22px 45px rgba(0,132,255,0.16); }
        #auth-title {
            color: #0084ff; margin-bottom: 0; cursor: pointer; user-select: none;
            transform: translateZ(42px); transition: transform 0.55s ease, margin-bottom 0.55s ease;
        }
        .auth-box.open #auth-title { margin-bottom: 18px; transform: translateZ(68px) scale(0.96); }
        .auth-content {
            max-height: 0; opacity: 0; overflow: hidden; pointer-events: none;
            transform: rotateX(-72deg) translateY(-24px) translateZ(-70px); transform-origin: top center;
            transition: max-height 0.7s ease, opacity 0.42s ease 0.12s, transform 0.7s cubic-bezier(0.2, 0.9, 0.2, 1);
        }
        .auth-box.open .auth-content {
            max-height: 520px; opacity: 1; pointer-events: auto;
            transform: rotateX(0deg) translateY(0) translateZ(0);
        }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; background: #f5f6f7; }
        .btn { width: 100%; padding: 12px; background: #0084ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .password-wrap { position: relative; }
        .password-wrap input { padding-right: 44px; }
        .eye-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            width: 30px; height: 30px; border: none; border-radius: 50%; background: transparent;
            color: #0084ff; cursor: pointer; display: grid; place-items: center;
        }
        .eye-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }

        #home-screen { display: flex; flex-direction: column; height: 100vh; width: 100%; position: relative; }
        .home-header { padding: 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f0f0f0; background: #fff; }
        .my-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .my-info h2 { font-size: 18px; font-weight: bold; line-height: 1.2; }
        .my-status { font-size: 12px; color: #65676b; }
        .status-dot { color: #31a24c; font-size: 10px; }
        .header-icon-btn {
            width: 42px; height: 42px; border: none; border-radius: 50%; background: #e7f3ff;
            color: #0084ff; cursor: pointer; display: grid; place-items: center;
        }
        .header-icon-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .user-list { flex: 1; overflow-y: auto; background: #fff; }
        .user-card { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f9f9f9; }
        .user-card:active { background: #f0f2f5; }
        .user-card img { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; object-fit: cover; background: #eee; }
        .user-card strong { font-size: 17px; }

        .fab-btn {
            position: absolute; bottom: 30px; right: 25px;
            width: 56px; height: 56px; background: #0084ff;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 4px 12px rgba(0,132,255,0.4);
            cursor: pointer; z-index: 1001; transition: 0.2s;
        }
        .fab-btn svg { width: 28px; height: 28px; fill: white; }

        .search-popup {
            position: fixed; bottom: 100px; right: 25px;
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15); width: 280px; z-index: 1002;
        }

        #chat-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            z-index: 2000; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: hidden; pointer-events: none;
        }
        #chat-screen.active { transform: translateX(0); visibility: visible; pointer-events: auto; }
        .chat-header { padding: 10px 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; background: #fff; }
        .back-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: #0084ff; padding: 5px; }
        .chat-header img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; }

        .msg-display { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: #fff; }
        .msg-row { display: flex; flex-direction: column; width: 100%; cursor: pointer; }
        .bubble { padding: 10px 16px; border-radius: 20px; max-width: 75%; font-size: 15px; line-height: 1.4; overflow-wrap: anywhere; }
        .sent { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #f0f0f0; color: black; border-bottom-left-radius: 4px; }

        .status-row { align-self: flex-end; font-size: 10px; color: #8a8d91; margin-right: 5px; margin-top: 2px; }
        .seen-img { width: 14px; height: 14px; border-radius: 50%; object-fit: cover; }

        .input-bar { padding: 12px 15px 25px; display: flex; gap: 10px; border-top: 1px solid #eee; background: white; }
        .input-bar input { flex: 1; border-radius: 25px; background: #f0f2f5; border: none; padding: 10px 18px; outline: none; font-size: 15px; }

        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.3); z-index: 3000; width: 320px; text-align: center; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; }

        .msg-options { display: flex; justify-content: space-around; margin-top: 10px; }
        .opt-btn { font-size: 12px; color: #0084ff; cursor: pointer; font-weight: bold; }
        .opt-del { color: #ff4757; }
        .admin-code-box { background: #eef7ff; border: 1px solid #b9ddff; border-radius: 10px; padding: 12px; margin: 12px 0; text-align: left; }
        .admin-code-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
        .admin-code { flex: 1; font-size: 22px; font-weight: 800; color: #0084ff; letter-spacing: 2px; }
        .mini-btn { border: none; border-radius: 8px; background: #0084ff; color: white; padding: 8px 10px; cursor: pointer; font-size: 12px; font-weight: 700; }
        #admin-users-screen {
            position: fixed; inset: 0; background: #f0f2f5; z-index: 2500;
            display: flex; flex-direction: column; transform: translateX(100%);
            visibility: hidden; pointer-events: none;
            transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #admin-users-screen.active { transform: translateX(0); visibility: visible; pointer-events: auto; }
        .admin-screen-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: #fff; border-bottom: 1px solid #e8edf3; }
        .admin-screen-title { flex: 1; }
        .admin-screen-title h2 { font-size: 20px; line-height: 1.2; }
        .admin-screen-title small { color: #65676b; }
        .admin-user-list { flex: 1; overflow-y: auto; padding: 14px; display: grid; gap: 12px; align-content: start; text-align: left; }
        .admin-user-card { border: 1px solid #dce8f5; border-radius: 12px; padding: 14px; background: #fff; box-shadow: 0 6px 18px rgba(0,0,0,0.04); }
        .admin-user-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .admin-user-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #e9eef5; }
        .admin-user-card strong { display: block; margin-bottom: 2px; font-size: 16px; }
        .admin-user-card small { color: #65676b; overflow-wrap: anywhere; }
        .admin-user-details { background: #f7fbff; border: 1px solid #e0efff; border-radius: 10px; padding: 10px; display: grid; gap: 4px; }
        .admin-user-actions { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; margin-top: 10px; }
        .admin-user-actions input { margin: 0; min-width: 0; padding: 9px; }
        .admin-remove-row { display: flex; justify-content: flex-end; margin-top: 8px; }
        .danger-btn { background: #ff4757; }

        @media (min-width: 720px) {
            body { background: #eef1f5; }
            #home-screen { width: min(420px, 100%); margin: 0 auto; box-shadow: 0 0 30px rgba(0,0,0,0.08); background: white; }
            #chat-screen { width: min(420px, 100%); left: 50%; transform: translate(120vw, 0); }
            #chat-screen.active { transform: translate(-50%, 0); }
            #admin-users-screen { width: min(420px, 100%); left: 50%; right: auto; transform: translate(120vw, 0); box-shadow: 0 0 30px rgba(0,0,0,0.08); }
            #admin-users-screen.active { transform: translate(-50%, 0); }
        }

        @media (max-width: 390px) {
            .admin-user-actions { grid-template-columns: 1fr 1fr; }
            .admin-user-actions input { grid-column: 1 / -1; }
        }
    </style>
</head>
<body>
    <div id="auth-screen" class="auth-container">
        <div class="auth-box" id="auth-box">
            <h2 id="auth-title" onclick="openAuthPanel()" role="button" tabindex="0" onkeypress="if(event.key==='Enter') openAuthPanel()">WebChat</h2>
            <div class="auth-content">
                <div id="login-fields">
                    <input type="text" id="l-phone" placeholder="Phone Number">
                    <div class="password-wrap">
                        <input type="password" id="l-pass" placeholder="Password">
                        <button class="eye-btn" type="button" onclick="togglePassword('l-pass', this)" aria-label="Show password">
                            <svg viewBox="0 0 24 24"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <button class="btn" onclick="login()">Log In</button>
                    <p style="margin-top:20px; color:#0084ff; cursor:pointer; font-size:14px; font-weight: 500;" onclick="toggleView()">Register New User</p>
                </div>
                <div id="admin-fields" class="hidden">
                    <div id="reg-fields">
                        <input type="text" id="r-name" placeholder="Full Name">
                        <input type="text" id="r-phone" placeholder="Phone Number">
                        <div class="password-wrap">
                            <input type="password" id="r-pass" placeholder="Password">
                            <button class="eye-btn" type="button" onclick="togglePassword('r-pass', this)" aria-label="Show password">
                                <svg viewBox="0 0 24 24"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                        <div class="password-wrap">
                            <input type="password" id="permission-code" placeholder="Admin Permission Code">
                            <button class="eye-btn" type="button" onclick="togglePassword('permission-code', this)" aria-label="Show password">
                                <svg viewBox="0 0 24 24"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                        <button class="btn" style="background:#25d366" onclick="registerUser()">Create User</button>
                    </div>
                    <p style="margin-top:20px; color:#0084ff; cursor:pointer; font-size:14px;" onclick="toggleView()">Back to Login</p>
                </div>
            </div>
        </div>
    </div>

    <div id="home-screen" class="hidden">
        <div class="home-header">
            <img id="my-avatar" src="" alt="My profile picture" style="width: 45px; height: 45px; border-radius: 50%; cursor: pointer; object-fit: cover;" onclick="showProfileModal()">
            <div class="my-info">
                <h2 id="my-name-display">My Name</h2>
                <span class="my-status"><span class="status-dot">●</span> Active now</span>
            </div>
            <button id="admin-users-btn" class="header-icon-btn hidden" onclick="showAdminUsersModal()" title="View users">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zM8 11c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            </button>
        </div>
        <div class="user-list" id="user-list-items"></div>
        <div class="fab-btn" onclick="toggleSearchPopup()">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <div id="search-popup" class="search-popup hidden">
            <h4>Add New Contact</h4>
            <input type="text" id="search-number" placeholder="Enter phone number..." onclick="event.stopPropagation()">
            <button class="btn" style="margin-top: 5px;" onclick="searchAndAddUser()">Search & Add</button>
        </div>
    </div>
    <div id="search-overlay" class="overlay hidden" style="background: rgba(0,0,0,0.15);" onclick="toggleSearchPopup()"></div>

    <div id="chat-screen">
        <div class="chat-header">
            <button class="back-btn" onclick="window.history.back()">&#8592;</button>
            <img id="chat-user-img" src="" alt="Chat profile picture">
            <strong id="chat-user-name">User Name</strong>
        </div>
        <div class="msg-display" id="msg-box"></div>
        <div class="input-bar">
            <input type="text" id="msg-input" placeholder="Aa" onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="border:none; color:#0084ff; font-weight:bold; background:none; cursor:pointer; font-size: 16px;">Send</button>
        </div>
    </div>

    <div id="msg-modal" class="modal hidden">
        <h4 style="margin-bottom: 15px;">Message Actions</h4>
        <input type="text" id="edit-msg-input" placeholder="Edit message...">
        <div class="msg-options">
            <span class="opt-btn" onclick="confirmEdit()">Update</span>
            <span class="opt-btn opt-del" onclick="confirmDelete()">Delete</span>
            <span class="opt-btn" style="color:#666" onclick="closeMsgModal()">Cancel</span>
        </div>
    </div>

    <div id="profile-modal" class="modal hidden">
        <h3 style="margin-bottom: 15px;">Edit Profile</h3>
        <div id="admin-code-section" class="admin-code-box hidden">
            <small>Register permission code</small>
            <div class="admin-code-row">
                <span id="current-admin-code" class="admin-code">------</span>
                <button class="mini-btn" onclick="copyAdminCode()">Copy</button>
            </div>
            <small id="admin-code-timer">Changes every 2 minutes. One code works one time.</small>
        </div>
        <input type="text" id="edit-name" placeholder="Name">
        <div class="password-wrap">
            <input type="password" id="edit-pass" placeholder="New Password">
            <button class="eye-btn" type="button" onclick="togglePassword('edit-pass', this)" aria-label="Show password">
                <svg viewBox="0 0 24 24"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>
        <input type="file" id="edit-pic" accept="image/*" style="font-size:12px; margin-top:10px;">
        <button class="btn" onclick="saveProfile()" style="margin-top:15px;">Save Changes</button>
        <button class="btn" style="background:#eee; color:#333; margin-top:8px;" onclick="closeProfileModal()">Cancel</button>
        <button class="btn" style="background:#ff4757; color:white; margin-top:20px;" onclick="logout()">Log Out</button>
    </div>
    <div id="admin-users-screen">
        <div class="admin-screen-header">
            <button class="back-btn" onclick="closeAdminUsersModal()">&#8592;</button>
            <div class="admin-screen-title">
                <h2>All Users</h2>
                <small id="admin-user-count">0 users</small>
            </div>
        </div>
        <div id="admin-user-list" class="admin-user-list"></div>
    </div>
    <div id="overlay" class="overlay hidden" onclick="closeAllModals()"></div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD3n2MmShTGhIr5xXnT6Tgoe3RkrGiSE48",
            authDomain: "affilancers-lead-summary.firebaseapp.com",
            databaseURL: "https://affilancers-lead-summary-default-rtdb.firebaseio.com",
            projectId: "affilancers-lead-summary",
            storageBucket: "affilancers-lead-summary.firebasestorage.app",
            messagingSenderId: "511932931366",
            appId: "1:511932931366:web:06a1635a6f201dbafbb5e7"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const fallbackAvatar = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        let me = null;
        let activePeer = null;
        let inboxUsers = [];
        let selectedMsgId = null;
        let activeChatRef = null;
        let adminCodeInterval = null;
        let adminUsersRef = null;

        window.onload = function() {
            const savedUser = localStorage.getItem('messenger_user');
            if(savedUser) {
                me = JSON.parse(savedUser);
                if (!me.isAdmin) setPresence(me.phone);
                const savedInbox = localStorage.getItem('inbox_' + me.phone);
                if(savedInbox) inboxUsers = JSON.parse(savedInbox);
                startApp();
            }
        };

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function getChatID(userPhone) {
            return me.phone < userPhone ? me.phone + "_" + userPhone : userPhone + "_" + me.phone;
        }

        function generatePermissionCode() {
            return String(Math.floor(100000 + Math.random() * 900000));
        }

        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            input.type = input.type === "password" ? "text" : "password";
            button.setAttribute("aria-label", input.type === "password" ? "Show password" : "Hide password");
        }

        function copyText(value) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(value).then(() => alert("Copied!"));
                return;
            }
            const temp = document.createElement('input');
            temp.value = value;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            temp.remove();
            alert("Copied!");
        }

        function copyAdminCode() {
            const code = document.getElementById('current-admin-code').innerText.trim();
            if (code && code !== "------") copyText(code);
        }

        function ensureAdminPermissionCode() {
            if (!me || !me.isAdmin) return;
            const ref = database.ref('admin/permissionCode');
            ref.once('value', snap => {
                const data = snap.val();
                if (!data || data.used || Date.now() >= data.expiresAt) {
                    ref.set({ code: generatePermissionCode(), expiresAt: Date.now() + 120000, used: false });
                }
            });
        }

        function watchAdminPermissionCode() {
            if (!me || !me.isAdmin) return;
            ensureAdminPermissionCode();
            database.ref('admin/permissionCode').on('value', snap => {
                const data = snap.val();
                document.getElementById('current-admin-code').innerText = data && !data.used ? data.code : "------";
                if (data && !data.used) {
                    const seconds = Math.max(0, Math.ceil((data.expiresAt - Date.now()) / 1000));
                    document.getElementById('admin-code-timer').innerText = `Changes in ${seconds}s. One code works one time.`;
                }
            });
            clearInterval(adminCodeInterval);
            adminCodeInterval = setInterval(() => {
                ensureAdminPermissionCode();
                database.ref('admin/permissionCode').once('value', snap => {
                    const data = snap.val();
                    if (data && !data.used) {
                        const seconds = Math.max(0, Math.ceil((data.expiresAt - Date.now()) / 1000));
                        document.getElementById('admin-code-timer').innerText = `Changes in ${seconds}s. One code works one time.`;
                    }
                });
            }, 1000);
        }

        function setPresence(phone) {
            const statusRef = database.ref('users/' + phone + '/status');
            database.ref('.info/connected').on('value', snap => {
                if (snap.val() === true) {
                    statusRef.set("online");
                    statusRef.onDisconnect().set("offline");
                }
            });
        }

        function login() {
            const phone = document.getElementById('l-phone').value.trim();
            const pass = document.getElementById('l-pass').value;
            if (phone === "sihab" && pass === "sihab@123") {
                me = { name: "Sihab Admin", phone: "sihab", password: "sihab@123", pic: "", status: "online", isAdmin: true };
                localStorage.setItem('messenger_user', JSON.stringify(me));
                location.reload();
                return;
            }
            database.ref('users/' + phone).once('value', snap => {
                const data = snap.val();
                if(data && data.password === pass) {
                    me = data;
                    setPresence(me.phone);
                    localStorage.setItem('messenger_user', JSON.stringify(me));
                    location.reload();
                } else alert("Invalid Login!");
            });
        }

        function logout() {
            if (me && !me.isAdmin) database.ref('users/' + me.phone).update({ status: "offline" });
            localStorage.removeItem('messenger_user');
            location.reload();
        }

        function openAuthPanel() {
            document.getElementById('auth-box').classList.add('open');
        }

        function toggleView() {
            openAuthPanel();
            document.getElementById('login-fields').classList.toggle('hidden');
            document.getElementById('admin-fields').classList.toggle('hidden');
        }

        function registerUser() {
            const name = document.getElementById('r-name').value.trim();
            const phone = document.getElementById('r-phone').value.trim();
            const pass = document.getElementById('r-pass').value;
            const permissionCode = document.getElementById('permission-code').value;
            if (!name || !phone || !pass || !permissionCode) {
                alert("Please fill in all fields.");
                return;
            }
            database.ref('users/' + phone).once('value', snap => {
                if (snap.exists()) {
                    alert("This phone number is already registered.");
                    return;
                }
                database.ref('admin/permissionCode').transaction(current => {
                    if (!current || current.used || current.code !== permissionCode || Date.now() >= current.expiresAt) return;
                    return { ...current, used: true, usedBy: phone, usedAt: Date.now() };
                }, (error, committed) => {
                    if (error || !committed) {
                        alert("Wrong, expired, or already used permission code!");
                        return;
                    }
                    database.ref('users/' + phone).set({ name, phone, password: pass, pic: "", status: "offline" }).then(() => {
                        alert("User Created!");
                        document.getElementById('r-name').value = "";
                        document.getElementById('r-phone').value = "";
                        document.getElementById('r-pass').value = "";
                        document.getElementById('permission-code').value = "";
                        toggleView();
                    });
                });
            });
        }

        function startApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('my-avatar').src = me.pic || fallbackAvatar;
            document.getElementById('my-name-display').innerText = me.name;
            document.getElementById('edit-name').value = me.name || "";
            document.getElementById('admin-users-btn').classList.toggle('hidden', !me.isAdmin);
            document.getElementById('admin-code-section').classList.toggle('hidden', !me.isAdmin);
            if (me.isAdmin) watchAdminPermissionCode();
            renderUserList();
        }

        function toggleSearchPopup() {
            document.getElementById('search-popup').classList.toggle('hidden');
            document.getElementById('search-overlay').classList.toggle('hidden');
        }

        function searchAndAddUser() {
            const num = document.getElementById('search-number').value.trim();
            database.ref('users/' + num).once('value', snap => {
                if(snap.exists() && num !== me.phone) {
                    if(!inboxUsers.includes(num)) {
                        inboxUsers.push(num);
                        localStorage.setItem('inbox_' + me.phone, JSON.stringify(inboxUsers));
                    }
                    document.getElementById('search-number').value = "";
                    toggleSearchPopup();
                    renderUserList();
                } else alert("User not found!");
            });
        }

        function renderUserList() {
            database.ref('users').on('value', snap => {
                const all = snap.val() || {};
                const list = document.getElementById('user-list-items');
                list.innerHTML = "";
                inboxUsers.forEach(phone => {
                    const u = all[phone];
                    if(u) {
                        const card = document.createElement('div');
                        card.className = "user-card";
                        card.onclick = () => openChat(u);
                        card.innerHTML = `
                            <img src="${escapeHtml(u.pic || fallbackAvatar)}" alt="">
                            <div>
                                <strong>${escapeHtml(u.name)}</strong><br>
                                <small style="color:${u.status === 'online' ? '#31a24c' : '#888'}">${u.status === 'online' ? '● Active now' : '○ Offline'}</small>
                            </div>
                        `;
                        list.appendChild(card);
                    }
                });
            });
        }

        function openChat(user) {
            activePeer = user;
            document.getElementById('chat-screen').classList.add('active');
            document.getElementById('chat-user-name').innerText = user.name;
            document.getElementById('chat-user-img').src = user.pic || fallbackAvatar;
            window.history.pushState({chat: true}, "");
            const chatID = getChatID(user.phone);
            if (activeChatRef) activeChatRef.off();
            activeChatRef = database.ref('messages/' + chatID);
            activeChatRef.on('value', snap => {
                const box = document.getElementById('msg-box');
                box.innerHTML = "";
                const msgs = snap.val() || {};
                Object.keys(msgs).forEach(id => {
                    const m = msgs[id];
                    const isMe = m.sender === me.phone;
                    if(!isMe && m.status !== 'seen') database.ref('messages/' + chatID + '/' + id).update({status: 'seen'});
                    const statusIcon = isMe ? (m.status === 'seen' ? `<img src="${escapeHtml(activePeer.pic || fallbackAvatar)}" class="seen-img" alt="Seen">` : (m.status === 'delivered' ? "✓✓" : "✓")) : "";
                    const row = document.createElement('div');
                    row.className = "msg-row";
                    row.onclick = () => isMe ? openMsgModal(id, m.text) : null;
                    row.innerHTML = `<div class="bubble ${isMe ? 'sent' : 'received'}">${escapeHtml(m.text)}</div>${isMe ? `<div class="status-row">${statusIcon}</div>` : ''}`;
                    box.appendChild(row);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            if(!input.value.trim() || !activePeer) return;
            const chatID = getChatID(activePeer.phone);
            database.ref('messages/' + chatID).push({ sender: me.phone, text: input.value.trim(), status: activePeer.status === 'online' ? 'delivered' : 'sent' });
            input.value = "";
        }

        function openMsgModal(id, text) {
            selectedMsgId = id;
            document.getElementById('edit-msg-input').value = text;
            document.getElementById('msg-modal').classList.remove('hidden');
            document.getElementById('overlay').classList.remove('hidden');
        }

        function confirmEdit() {
            const newText = document.getElementById('edit-msg-input').value.trim();
            if (!newText) return;
            const chatID = getChatID(activePeer.phone);
            database.ref('messages/' + chatID + '/' + selectedMsgId).update({ text: newText });
            closeMsgModal();
        }

        function confirmDelete() {
            const chatID = getChatID(activePeer.phone);
            database.ref('messages/' + chatID + '/' + selectedMsgId).remove();
            closeMsgModal();
        }

        function closeMsgModal() {
            document.getElementById('msg-modal').classList.add('hidden');
            document.getElementById('overlay').classList.add('hidden');
        }

        function showProfileModal() {
            document.getElementById('edit-name').value = me.name || "";
            document.getElementById('profile-modal').classList.remove('hidden');
            document.getElementById('overlay').classList.remove('hidden');
        }

        function closeProfileModal() {
            document.getElementById('profile-modal').classList.add('hidden');
            document.getElementById('overlay').classList.add('hidden');
        }

        function showAdminUsersModal() {
            if (!me || !me.isAdmin) return;
            document.getElementById('admin-users-screen').classList.add('active');
            if (adminUsersRef) adminUsersRef.off();
            adminUsersRef = database.ref('users');
            adminUsersRef.on('value', snap => renderAdminUserList(snap.val() || {}));
        }

        function closeAdminUsersModal() {
            document.getElementById('admin-users-screen').classList.remove('active');
            if (adminUsersRef) {
                adminUsersRef.off();
                adminUsersRef = null;
            }
        }

        function renderAdminUserList(users) {
            const list = document.getElementById('admin-user-list');
            list.innerHTML = "";
            const phones = Object.keys(users);
            document.getElementById('admin-user-count').innerText = `${phones.length} user${phones.length === 1 ? "" : "s"}`;
            if (!phones.length) {
                list.innerHTML = "<small>No users found.</small>";
                return;
            }
            phones.forEach(phone => {
                const user = users[phone];
                const card = document.createElement('div');
                card.className = "admin-user-card";

                const top = document.createElement('div');
                top.className = "admin-user-top";
                const avatar = document.createElement('img');
                avatar.className = "admin-user-avatar";
                avatar.src = user.pic || fallbackAvatar;
                avatar.alt = "";
                const identity = document.createElement('div');
                const name = document.createElement('strong');
                name.innerText = user.name || "Unnamed User";
                const status = document.createElement('small');
                status.innerText = user.status === "online" ? "Active now" : "Offline";
                identity.append(name, status);
                top.append(avatar, identity);

                const details = document.createElement('div');
                details.className = "admin-user-details";
                const phoneLine = document.createElement('small');
                phoneLine.innerText = `Phone: ${user.phone || phone}`;
                const passLine = document.createElement('small');
                passLine.innerText = `Password: ${user.password || ""}`;
                details.append(phoneLine, passLine);

                const actions = document.createElement('div');
                actions.className = "admin-user-actions";

                const passInput = document.createElement('input');
                passInput.type = "text";
                passInput.placeholder = "New password";

                const changeBtn = document.createElement('button');
                changeBtn.className = "mini-btn";
                changeBtn.innerText = "Change";
                changeBtn.onclick = () => changeUserPassword(phone, passInput.value);

                const copyBtn = document.createElement('button');
                copyBtn.className = "mini-btn";
                copyBtn.innerText = "Copy";
                copyBtn.onclick = () => copyText(user.password || "");

                const removeBtn = document.createElement('button');
                removeBtn.className = "mini-btn danger-btn";
                removeBtn.innerText = "Remove";
                removeBtn.onclick = () => removeUser(phone);
                const removeRow = document.createElement('div');
                removeRow.className = "admin-remove-row";
                removeRow.appendChild(removeBtn);

                actions.append(passInput, changeBtn, copyBtn);
                card.append(top, details, actions, removeRow);
                list.appendChild(card);
            });
        }

        function changeUserPassword(phone, newPassword) {
            if (!newPassword.trim()) {
                alert("Enter a new password.");
                return;
            }
            database.ref('users/' + phone).update({ password: newPassword.trim() }).then(() => alert("Password changed!"));
        }

        function removeUser(phone) {
            if (!confirm("Remove this user?")) return;
            database.ref('users/' + phone).remove().then(() => alert("User removed."));
        }

        function closeAllModals() {
            closeMsgModal();
            closeProfileModal();
            if (document.getElementById('admin-users-screen').classList.contains('active')) closeAdminUsersModal();
        }

        function saveProfile() {
            const name = document.getElementById('edit-name').value.trim() || me.name;
            const pass = document.getElementById('edit-pass').value || me.password;
            const file = document.getElementById('edit-pic').files[0];
            if (me.isAdmin) {
                me = { ...me, name, password: pass };
                localStorage.setItem('messenger_user', JSON.stringify(me));
                location.reload();
                return;
            }
            const save = updates => database.ref('users/' + me.phone).update(updates).then(() => {
                me = { ...me, ...updates };
                localStorage.setItem('messenger_user', JSON.stringify(me));
                location.reload();
            });
            if(file) {
                const reader = new FileReader();
                reader.onload = e => save({ name, password: pass, pic: e.target.result });
                reader.readAsDataURL(file);
            } else save({ name, password: pass });
        }

        window.onpopstate = () => {
            document.getElementById('chat-screen').classList.remove('active');
            closeAllModals();
            if (activeChatRef) {
                activeChatRef.off();
                activeChatRef = null;
            }
        };
    </script>
</body>
</html>
